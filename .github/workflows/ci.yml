name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore JustyBase.Netezza.slnx

      - name: Build
        run: dotnet build JustyBase.Netezza.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test JustyBase.Netezza.slnx --no-build --configuration Release --logger trx --collect:"XPlat Code Coverage"

      - name: Pack
        run: dotnet pack JustyBase.Netezza.csproj --no-build --configuration Release --output artifacts/packages

      - name: Check package vulnerabilities
        run: dotnet list JustyBase.Netezza.slnx package --vulnerable --include-transitive

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: netezza-package
          path: artifacts/packages/*
