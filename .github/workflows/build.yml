name: Build & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/**'
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore JustyBase.Netezza.slnx -p:UseLocalJustyBaseLibraries=false

      - name: Build
        run: dotnet build JustyBase.Netezza.slnx --no-restore -c Release

      - name: Test
        run: dotnet test JustyBase.Netezza.slnx --no-build -c Release --verbosity normal

      - name: Pack
        run: dotnet pack JustyBase.Netezza.csproj --no-build -c Release -o ./artifacts -p:UseLocalJustyBaseLibraries=false

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg

  publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkgs
          path: ./artifacts

      - name: NuGet login (OIDC)
        id: login
        uses: nuget/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: pwsh
        run: |
          foreach ($file in Get-ChildItem ./artifacts/*.nupkg) {
            dotnet nuget push $file.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
